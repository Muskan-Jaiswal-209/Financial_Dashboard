services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: financial-dashboard-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. Frontend Web Service (Streamlit)
  - type: web
    name: financial-dashboard-frontend
    env: python
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: financial-dashboard-backend
          property: host
      - key: PYTHON_VERSION
        value: 3.10.0
